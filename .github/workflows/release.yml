name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/build/libs/*.jar

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish to GitHub Packages
        run: ./gradlew publishMavenPublicationToGitHubPackagesRepository || echo "GitHub Packages publish skipped (version may already exist)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Sonatype staging
        run: ./gradlew publishMavenPublicationToMavenCentralRepository --no-daemon
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Close and release to Maven Central
        run: |
          echo "Finding open staging repository..."
          REPO_ID=$(curl -sS -u "$SONATYPE_USERNAME:$SONATYPE_PASSWORD" \
            "https://ossrh-staging-api.central.sonatype.com/service/local/staging/repository" \
            | jq -r '.[].repositoryId' | head -1)

          if [ -z "$REPO_ID" ]; then
            echo "No open repository found via API."
            echo "Deployment should appear at: https://central.sonatype.com/publishing/deployments"
            exit 0
          fi

          echo "Closing repository: $REPO_ID"
          curl -sS -u "$SONATYPE_USERNAME:$SONATYPE_PASSWORD" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"stagedRepositoryIds\":[\"$REPO_ID\"],\"description\":\"MutKt ${{ github.ref_name }}\"}}" \
            "https://ossrh-staging-api.central.sonatype.com/service/local/staging/bulk/close"

          echo "Release initiated. Check status at: https://central.sonatype.com/publishing/deployments"
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/**/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
